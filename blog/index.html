<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A personal blog featuring articles on technology, development, and creative pursuits.">
    <meta name="keywords" content="blog, articles, technology, development">
    <meta name="author" content="Your Name">
    <title>Braelyn's Blog</title>
    <link rel="icon" type="image/jpeg" href="assets/me.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .post-item {
            margin: 0;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
        }
        .post-item:last-child {
            border-bottom: none;
        }
        .post-link {
            display: block;
            text-decoration: none;
            color: var(--text);
        }
        .post-link:hover .post-title {
            color: var(--link);
        }
        .post-title {
            display: block;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            transition: color 0.15s ease;
            margin-bottom: 0.15rem;
        }
        .post-desc {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 0.15rem;
        }
        .post-meta {
            display: block;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        #posts-container {
            margin-top: 0.5rem;
        }
    </style>
    <script src="theme.js"></script>
    <link rel="alternate" type="application/rss+xml" title="Braelyn's Blog RSS Feed" href="/feed.xml">
</head>

<body>
    <header>
        <div class="bio">
            <img src="assets/me.jpg" alt="Braelyn Boynton" class="bio-photo">
            <div class="bio-text">
                <h1>Braelyn Boynton</h1>
                <p>Building cool shit, dancing in warehouses, motorcycles, planes and adrenaline sports. This blog is focused on the first one.</p>
                <nav class="social-links">
                    <a href="https://x.com/braelyn_ai">X</a>
                    <a href="https://github.com/bboynton97">GitHub</a>
                    <a href="https://www.linkedin.com/in/braelyn-boynton">LinkedIn</a>
                    <a href="https://www.instagram.com/braelyn.b__">Instagram</a>
                    <a href="https://braelyn.ai">Personal Site</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <h2>Recent Posts</h2>
        <div id="posts-container">
            <!-- Posts will be loaded here from posts.json -->
        </div>
    </main>

    <footer>
        <hr>
        <p>&copy; <script>document.write(new Date().getFullYear())</script> Braelyn Boynton</p>
    </footer>

    <script>
        const API_BASE = 'https://api.braelyn.ai';

        function slurp(eventType, eventData) {
            fetch(`${API_BASE}/slurp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event_type: eventType, event_data: eventData }),
            }).catch(() => {});
        }

        // Track blog home page view
        slurp('blog_page_view');

        // Track referrer
        if (document.referrer && !document.referrer.includes(location.hostname)) {
            slurp('referral', document.referrer);
        }

        // Track social link clicks
        document.querySelectorAll('.social-links a').forEach(link => {
            link.addEventListener('click', () => {
                slurp('blog_social_click', link.textContent.trim().toLowerCase());
            });
        });

        // Load posts from posts.json
        fetch('posts.json')
            .then(response => response.json())
            .then(posts => {
                const container = document.getElementById('posts-container');

                posts.forEach((post, index) => {
                    const article = document.createElement('article');
                    article.className = 'post-item';

                    const link = document.createElement('a');
                    link.href = `posts/${post.slug}.html`;
                    link.className = 'post-link';
                    link.addEventListener('click', () => slurp('blog_post_click', post.slug));

                    const title = document.createElement('span');
                    title.className = 'post-title';
                    title.textContent = post.title;

                    const meta = document.createElement('span');
                    meta.className = 'post-meta';
                    const time = document.createElement('time');
                    time.setAttribute('datetime', post.date);
                    time.textContent = new Date(post.date).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                    meta.appendChild(time);
                    meta.appendChild(document.createTextNode(` · ${post.readTime}`));

                    const description = document.createElement('span');
                    description.className = 'post-desc';
                    description.textContent = post.description;

                    link.appendChild(title);
                    link.appendChild(description);
                    link.appendChild(meta);
                    article.appendChild(link);

                    container.appendChild(article);
                });
            })
            .catch(error => console.error('Error loading posts:', error));
    </script>
</body>

</html>
